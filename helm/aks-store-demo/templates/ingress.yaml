apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: aks-store-ingress

  annotations:
    cert-manager.io/cluster-issuer: selfsigned-clusterissuer

    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    nginx.ingress.kubernetes.io/rewrite-target: /

spec:
  ingressClassName: nginx

  tls:
  - hosts:
      - store.aks.local
      - admin.aks.local
    secretName: aks-store-tls

  rules:

  - host: store.aks.local
    http:
      paths:

      - path: /
        pathType: Prefix

        backend:
          service:
            name: store-front
            port:
              number: 80

  - host: admin.aks.local
    http:
      paths:

      - path: /
        pathType: Prefix

        backend:
          service:
            name: store-admin
            port:
              number: 80
