name: Build and Push to ACR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      #######################################################################
      # Checkout Platform Repository
      #######################################################################

      - name: Checkout Platform Repository
        uses: actions/checkout@v4

      #######################################################################
      # Checkout Application Repository
      #######################################################################

      - name: Checkout Application Repository
        uses: actions/checkout@v4
        with:
          repository: gunjankapoor99/aks-store-demo
          path: aks-store-demo

      #######################################################################
      # Azure Login (OIDC)
      #######################################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      #######################################################################
      # Login to Azure Container Registry
      #######################################################################

      - name: Login to Azure Container Registry
        run: |
          az acr login --name $ACR_NAME

      #######################################################################
      # Verify Azure Login
      #######################################################################

      - name: Verify Azure Login
        run: |
          az account show
          az acr list -o table

      #######################################################################
      # Verify Repository Structure
      #######################################################################

      - name: Show Repository Structure
        run: |
          pwd
          echo "--------------------------------"
          ls -la
          echo "--------------------------------"
          ls -la aks-store-demo
          echo "--------------------------------"
          ls -la aks-store-demo/src

      #######################################################################
      # Build Docker Image
      #######################################################################

      - name: Build Store Front Image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/store-front:latest \
            ./aks-store-demo/src/store-front

      #######################################################################
      # Push Docker Image
      #######################################################################

      - name: Push Store Front Image
        run: |
          docker push $ACR_NAME.azurecr.io/store-front:latest
