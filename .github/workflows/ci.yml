name: Build and Push Images

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Platform Repository
      uses: actions/checkout@v4

    - name: Checkout Microsoft AKS Store Demo
      uses: actions/checkout@v4
      with:
        repository: Azure-Samples/aks-store-demo
        path: app

    - name: Verify folders
      run: |
        pwd
        ls
        ls app
        ls app/src

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Login to ACR
      run: |
        az acr login --name $ACR_NAME

    - name: Verify Azure Login
      run: |
        az account show
        az acr list -o table
